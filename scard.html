<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Leon Diamond — NYC Showroom</title>
<meta name="description" content="Leon Diamond — Fine Jewelry on 47th Street, NYC. Tap to save contact, call, email, or visit the showroom." />
<meta name="theme-color" content="#071828" />

<meta property="og:title" content="Leon Diamond" />
<meta property="og:description" content="Fine Jewelry — 74 West 47th Street, New York" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-1:#f6f0e6;
    --bg-2:#ece4d3;
    --paper:#fbf6ec;
    --ink:#071828;
    --ink-soft:#0d2236;
    --accent:#2a6da4;
    --accent-soft:#4a8cc2;
    --line:rgba(7,24,40,.10);
    --line-strong:rgba(7,24,40,.18);
    --tile:rgba(255,255,255,.55);
    --radius:16px;
    --shadow:0 24px 50px -28px rgba(7,24,40,.28), 0 8px 22px -14px rgba(7,24,40,.18);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 60% at 50% 0%, #fbf7ee 0%, var(--bg-1) 55%, var(--bg-2) 100%);
    min-height:100vh;min-height:100svh;
    display:flex;align-items:flex-start;justify-content:center;
    padding:16px 12px 24px;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  }

  .card{
    position:relative;width:100%;max-width:420px;
    background:var(--paper);
    border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);
    isolation:isolate;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ===== Hero ===== */
  .hero{
    position:relative;width:100%;
    aspect-ratio:21/10;
    overflow:hidden;background:#0d2236;
  }
  .hero-img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center 50%;
    display:block;
    transform:scale(1.02);transition:transform 1.4s ease;
  }
  .hero:hover .hero-img{transform:scale(1.05)}
  .hero-overlay{
    position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg, rgba(7,24,40,.05) 0%, rgba(7,24,40,.10) 45%, rgba(7,24,40,.55) 82%, rgba(7,24,40,.82) 100%);
  }
  .hero-logo{
    position:absolute;left:50%;bottom:14%;
    transform:translateX(-50%);
    width:auto;height:auto;
    max-width:42%;max-height:24%;
    object-fit:contain;
    pointer-events:none;z-index:2;
    filter:drop-shadow(0 2px 10px rgba(0,0,0,.4));
  }
  .hero-caption{
    position:absolute;left:0;right:0;bottom:6%;
    text-align:center;
    color:rgba(230,237,245,.85);
    font-size:9px;letter-spacing:.4em;text-transform:uppercase;
    font-weight:500;z-index:2;pointer-events:none;
  }
  .hero-logo{
    position:absolute;left:50%;bottom:11%;
    transform:translateX(-50%);
    width:auto;height:auto;
    max-width:42%;max-height:22%;
    object-fit:contain;
    pointer-events:none;
    z-index:2;
    filter:drop-shadow(0 2px 10px rgba(0,0,0,.35));
  }

  /* ===== Card content ===== */
  .card-inner{
    position:relative;z-index:1;
    padding:20px 22px 18px;text-align:center;
  }
  .card-inner::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 380' preserveAspectRatio='xMidYMid slice'>\
<defs><linearGradient id='g1' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23ffffff' stop-opacity='.85'/><stop offset='1' stop-color='%23d9d0bf' stop-opacity='.45'/></linearGradient>\
<linearGradient id='g2' x1='1' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ffffff' stop-opacity='.75'/><stop offset='1' stop-color='%23c5bba7' stop-opacity='.3'/></linearGradient></defs>\
<polygon points='0,0 380,0 120,260 0,180' fill='url(%23g1)'/>\
<polygon points='600,0 600,220 320,80 380,0' fill='url(%23g2)'/></svg>");
    background-size:cover;background-position:center;opacity:.55;
  }
  .card-inner > *{position:relative;z-index:1}

  /* ===== Show banner (JCK Las Vegas) ===== */
  .show-banner{
    position:relative;text-align:center;
    margin:4px 0 14px;
    padding:12px 10px 12px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    background:rgba(42,109,164,.04);
  }
  .show-banner .kicker{
    display:block;
    font-size:8.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
    margin-bottom:5px;
  }
  .show-banner .booth{
    display:block;
    font-size:17px;font-weight:600;color:var(--ink);
    letter-spacing:.02em;line-height:1.15;
  }
  .show-banner .where{
    display:block;
    margin-top:5px;
    font-size:10px;letter-spacing:.06em;
    color:var(--ink-soft);
  }

  /* ===== Primary CTA ===== */
  .save{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;padding:13px 16px;border-radius:11px;
    background:var(--ink);color:var(--paper);text-decoration:none;
    font-family:inherit;font-weight:500;font-size:13.5px;letter-spacing:.04em;
    border:none;cursor:pointer;
    transition:transform .15s ease, background-color .25s ease;
    position:relative;z-index:3;
  }
  .save:hover{background:var(--accent)}
  .save:active{transform:translateY(1px)}
  .save svg{width:16px;height:16px;flex-shrink:0}
  .phone-cta{
    display:flex;align-items:center;justify-content:flex-start;gap:11px;
    width:100%;padding:14px 16px;border-radius:11px;
    background:var(--ink);color:var(--paper);
    font-family:inherit;font-weight:500;font-size:13.5px;letter-spacing:.04em;
    border:none;cursor:pointer;text-align:left;
    transition:background-color .25s ease;
    position:relative;z-index:3;
    margin-bottom:8px;
  }
  .phone-cta:hover{background:var(--accent)}
  .phone-cta:active{transform:translateY(1px)}
  .phone-cta > svg:first-of-type{width:17px;height:17px;flex-shrink:0}
  .phone-cta .cta-label{flex:1;text-align:left}
  .phone-cta .cta-sub{
    opacity:.7;font-weight:400;font-size:12px;letter-spacing:.02em;
    margin-left:3px;
  }
  .phone-cta .chev{
    width:14px;height:14px;flex-shrink:0;opacity:.7;
    transition:transform .25s ease, opacity .2s ease;
  }
  .phone-cta[aria-expanded="true"]{background:var(--accent)}
  .phone-cta[aria-expanded="true"] .chev{transform:rotate(180deg);opacity:1}


  /* ===== Actions ===== */
  .actions{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;
    grid-auto-rows:1fr;
    margin-top:10px;
  }
  .action{
    display:flex;align-items:center;gap:10px;
    padding:10px 11px;
    border:1px solid var(--line);border-radius:11px;
    text-decoration:none;color:var(--ink);
    text-align:left;
    background:var(--tile);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    min-width:0;
    transition:border-color .2s ease, background-color .2s ease, transform .15s ease;
    position:relative;z-index:3;
    cursor:pointer;
  }
  .action:hover{border-color:var(--accent);background:rgba(255,255,255,.85)}
  .action:active{transform:translateY(1px)}
  .action .icon{
    width:30px;height:30px;flex:0 0 30px;
    border-radius:8px;display:flex;align-items:center;justify-content:center;
    background:var(--ink);color:var(--paper);
  }
  .action .icon svg{width:14px;height:14px}
  .action .meta{
    display:flex;flex-direction:column;line-height:1.2;min-width:0;flex:1;overflow:hidden;
  }
  .action .label{
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .action .value{
    font-size:11.5px;font-weight:500;color:var(--ink);margin-top:1px;line-height:1.25;
    word-break:break-word;overflow-wrap:anywhere;white-space:normal;
  }
  .action.featured{
    border-color:var(--accent);
    background:rgba(42,109,164,.08);
  }
  .action.featured .icon{background:var(--accent)}

  .action.toggle{
    font-family:inherit;
    cursor:pointer;
    text-align:left;
  }
  .action.toggle .chev{
    flex-shrink:0;width:14px;height:14px;color:var(--accent);opacity:.7;
    transition:transform .25s ease;
  }
  .action.toggle[aria-expanded="true"]{
    border-color:var(--accent);
    background:rgba(42,109,164,.06);
  }
  .action.toggle[aria-expanded="true"] .chev{transform:rotate(180deg);opacity:1}

  /* ===== Phone Panel ===== */
  .phone-panel{
    margin-top:8px;
    border:1px solid var(--line);
    border-radius:11px;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    overflow:hidden;
    max-height:0;opacity:0;
    transition:max-height .35s ease, opacity .25s ease, margin-top .25s ease;
    position:relative;z-index:3;
  }
  .phone-panel.open{max-height:520px;opacity:1}
  .phone-panel-head{
    padding:10px 14px 8px;
    text-align:left;
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .phone-panel-head .htitle{
    font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .phone-panel-head .hint{
    font-size:9px;color:var(--ink-soft);opacity:.65;
    letter-spacing:.04em;
  }
  .contact-row{
    display:flex;align-items:center;gap:8px;
    padding:9px 12px;
    flex-wrap:wrap;
    border-bottom:1px solid rgba(7,24,40,.06);
  }
  .contact-row:last-of-type{border-bottom:none}
  .contact-row .cbox{
    width:18px;height:18px;flex:0 0 18px;
    border:1.4px solid rgba(7,24,40,.35);
    border-radius:4px;
    background:#fff;cursor:pointer;
    appearance:none;-webkit-appearance:none;
    position:relative;
    transition:background-color .15s ease, border-color .15s ease;
  }
  .contact-row .cbox:checked{
    background:var(--accent);border-color:var(--accent);
  }
  .contact-row .cbox:checked::after{
    content:"";position:absolute;left:5px;top:1.5px;
    width:5px;height:10px;
    border:solid #fff;border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .contact-row .cinfo{
    flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.15;
    text-align:left;
  }
  .contact-row .cname{
    font-size:13px;font-weight:500;color:var(--ink);
  }
  .contact-row .ctel{
    font-size:11px;color:var(--ink-soft);opacity:.75;margin-top:2px;
    letter-spacing:.02em;
  }
  .contact-row .crole{
    font-size:9px;color:var(--accent);opacity:.7;margin-top:1px;
    letter-spacing:.16em;text-transform:uppercase;
  }
  .contact-row .row-btns{
    flex:0 0 auto;display:flex;flex-direction:column;gap:4px;
  }
  .contact-row .call-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
    padding:5px 9px;border-radius:6px;
    background:var(--ink);color:var(--paper);
    text-decoration:none;
    font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;
    transition:background-color .2s ease, transform .12s ease;
  }
  .contact-row .call-btn:hover{background:var(--accent)}
  .contact-row .call-btn:active{transform:translateY(1px)}
  .contact-row .call-btn svg{width:10px;height:10px}
  .contact-row .save-row-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
    padding:5px 9px;border-radius:6px;
    background:var(--accent);color:var(--paper);
    border:none;font-family:inherit;cursor:pointer;
    font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;
    transition:background-color .2s ease, transform .12s ease;
  }
  .contact-row .save-row-btn:hover{background:var(--accent-soft)}
  .contact-row .save-row-btn:active{transform:translateY(1px)}
  .contact-row .save-row-btn svg{width:10px;height:10px}

  .save-selected{
    width:100%;
    padding:11px 14px;
    background:transparent;color:var(--accent);
    font-family:inherit;font-weight:500;font-size:11.5px;letter-spacing:.16em;
    text-transform:uppercase;border:none;border-top:1px solid var(--line);
    cursor:pointer;
    transition:background-color .2s ease, color .2s ease;
  }
  .save-selected:hover:not(:disabled){background:var(--accent);color:var(--paper)}
  .save-selected:disabled{opacity:.4;cursor:not-allowed}

  /* ===== Footer ===== */
  .footer{
    margin-top:14px;padding-top:12px;
    border-top:1px solid var(--line);
    text-align:center;font-size:9px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--ink-soft);opacity:.6;
  }

  /* ===== Toast ===== */
  .toast{
    position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:var(--paper);
    padding:10px 16px;border-radius:999px;
    font-size:11px;letter-spacing:.06em;
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-height:680px){
    .hero{aspect-ratio:21/8}
    .card-inner{padding:16px 18px 14px}
  }
  @media (max-width:360px){
    .actions{grid-template-columns:1fr}
  }
</style>
</head>

<div class="toast" id="toast" role="status" aria-live="polite">Contact downloaded</div>

<script>
(function(){
  var toast = document.getElementById('toast');

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2400);
  }

  function downloadVcf(text, filename){
    try {
      var blob = new Blob([text], {type:'text/vcard;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
      return true;
    } catch(err){
      var data = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(text);
      window.location.href = data;
      return false;
    }
  }

  // ===== Phone panel: toggle + multi-select + batch vCard =====
  var phoneToggle = document.getElementById('phoneToggle');
  var phonePanel  = document.getElementById('phonePanel');
  var saveSelBtn  = document.getElementById('saveSelectedBtn');
  var checkboxes  = phonePanel ? phonePanel.querySelectorAll('.cbox') : [];

  if (phoneToggle && phonePanel) {
    phoneToggle.addEventListener('click', function(){
      var open = phonePanel.classList.toggle('open');
      phoneToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (open) {
        setTimeout(function(){
          phonePanel.scrollIntoView({behavior:'smooth', block:'nearest'});
        }, 200);
      }
    });
  }

  function buildContactVcard(name, tel, role){
    var first = name.split(' ')[0];
    var last  = name === 'Store' ? 'Store' : 'Leon Diamond';
    var fn    = name === 'Store' ? 'Leon Diamond — Store' : (first + ' — Leon Diamond');
    return [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:' + fn,
      'N:' + last + ';' + first + ';;;',
      'ORG:Leon Diamond',
      'TITLE:' + (role || 'Senior Sales Associate'),
      'TEL;TYPE=' + (name === 'Store' ? 'WORK,VOICE' : 'CELL,VOICE') + ':' + tel,
      'EMAIL;TYPE=WORK,INTERNET:Leondiamondnyc@gmail.com',
      'URL:https://leondiamond.com',
      'ADR;TYPE=WORK:;;74 West 47th Street;New York;NY;10036;USA',
      'NOTE:Leon Diamond NYC — Fine Jewelry, Diamond District',
      'END:VCARD'
    ].join('\n');
  }

  function updateSaveButton(){
    var checked = phonePanel.querySelectorAll('.cbox:checked');
    var n = checked.length;
    saveSelBtn.disabled = n === 0;
    saveSelBtn.textContent = n === 0
      ? 'Save Selected (0)'
      : 'Save Selected (' + n + ')';
  }

  Array.prototype.forEach.call(checkboxes, function(cb){
    cb.addEventListener('change', updateSaveButton);
  });

  if (saveSelBtn) {
    saveSelBtn.addEventListener('click', function(){
      var checked = phonePanel.querySelectorAll('.cbox:checked');
      if (checked.length === 0) return;

      var blocks = [];
      var names = [];
      Array.prototype.forEach.call(checked, function(cb){
        var name = cb.getAttribute('data-name');
        var tel  = cb.getAttribute('data-tel');
        var role = cb.closest('.contact-row').querySelector('.crole').textContent.trim();
        blocks.push(buildContactVcard(name, tel, role));
        names.push(name);
      });

      var multi = blocks.join('\n') + '\n';
      var filename = checked.length === 1
        ? 'LeonDiamond-' + names[0] + '.vcf'
        : 'LeonDiamond-' + checked.length + '-contacts.vcf';
      downloadVcf(multi, filename);

      // Reset
      Array.prototype.forEach.call(checked, function(cb){ cb.checked = false; });
      updateSaveButton();

      showToast(checked.length === 1
        ? names[0] + ' saved'
        : checked.length + ' contacts saved');
    });
  }
  // ===== Per-row save buttons =====
  var rowSaveBtns = phonePanel ? phonePanel.querySelectorAll('.save-row-btn') : [];
  Array.prototype.forEach.call(rowSaveBtns, function(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      var name = btn.getAttribute('data-name');
      var tel  = btn.getAttribute('data-tel');
      var row  = btn.closest('.contact-row');
      var role = row.querySelector('.crole').textContent.trim();
      var vcard = buildContactVcard(name, tel, role);
      var filename = 'LeonDiamond-' + name + '.vcf';
      downloadVcf(vcard + '\n', filename);
      showToast(name + ' saved');
    });
  });
})();
</script>
