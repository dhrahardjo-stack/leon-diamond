<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Leon Diamond — Digital Business Card</title>
<meta name="description" content="Leon Diamond — Fine Jewelry on 47th Street, NYC. Tap to save contact, call, email, or visit the showroom." />
<meta name="theme-color" content="#f3ece0" />

<meta property="og:title" content="Leon Diamond" />
<meta property="og:description" content="Fine Jewelry — 74 West 47th Street, New York" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,700;6..96,900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-1:#f6f0e6;            /* warm champagne page */
    --bg-2:#ece4d3;
    --paper:#fbf6ec;           /* slightly lighter than page = the card */
    --ink:#071828;             /* deep navy — primary text & buttons */
    --ink-soft:#0d2236;
    --accent:#2a6da4;          /* refined blue accent */
    --accent-soft:#4a8cc2;
    --line:rgba(7,24,40,.10);
    --line-strong:rgba(7,24,40,.18);
    --tile:rgba(255,255,255,.55);
    --radius:18px;
    --shadow:0 30px 60px -30px rgba(7,24,40,.25), 0 12px 30px -18px rgba(7,24,40,.18);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 60% at 50% 0%, #fbf7ee 0%, var(--bg-1) 55%, var(--bg-2) 100%);
    min-height:100vh;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding:24px 16px 48px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* ===== Card ===== */
  .card{
    position:relative;
    width:100%;
    max-width:440px;
    background:var(--paper);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    isolation:isolate;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* Folded-paper diamond texture */
  .card::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 380' preserveAspectRatio='xMidYMid slice'>\
<defs>\
<linearGradient id='g1' x1='0' y1='0' x2='1' y2='1'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.85'/>\
<stop offset='1' stop-color='%23d9d0bf' stop-opacity='.45'/>\
</linearGradient>\
<linearGradient id='g2' x1='1' y1='0' x2='0' y2='1'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.75'/>\
<stop offset='1' stop-color='%23c5bba7' stop-opacity='.3'/>\
</linearGradient>\
<linearGradient id='g3' x1='0' y1='1' x2='1' y2='0'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.5'/>\
<stop offset='1' stop-color='%23b3a98f' stop-opacity='.2'/>\
</linearGradient>\
</defs>\
<polygon points='0,0 380,0 120,260 0,180' fill='url(%23g1)'/>\
<polygon points='600,0 600,220 320,80 380,0' fill='url(%23g2)'/>\
<polygon points='0,380 240,180 460,380' fill='url(%23g3)'/>\
<polygon points='600,380 360,180 600,160' fill='url(%23g2)'/>\
<polygon points='240,180 460,380 360,180' fill='%23ffffff' fill-opacity='.3'/>\
</svg>");
    background-size:cover;background-position:center;
    opacity:.85;
  }

  .card-inner{position:relative;z-index:1;padding:46px 26px 28px;text-align:center}

  /* ===== Wordmark ===== */
  .wordmark{
    color:var(--ink);
    line-height:.95;
    margin:4px 0 4px;
    font-family:'Bodoni Moda','Didot','Bodoni 72',serif;
  }
  .wordmark .leon{
    display:block;
    font-weight:900;
    font-size:clamp(64px,16.5vw,96px);
    letter-spacing:.005em;
    line-height:.9;
  }
  .wordmark .diamond{
    display:block;
    font-weight:500;
    font-size:clamp(20px,5.4vw,28px);
    letter-spacing:.36em;
    margin-top:8px;
    padding-left:.36em;
  }

  .tagline{
    margin:18px auto 0;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }

  .divider{
    width:36px;height:1px;background:var(--line-strong);
    margin:18px auto 22px;
  }

  /* ===== Primary CTA ===== */
  .save{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;
    padding:16px 18px;
    border-radius:12px;
    background:var(--ink);
    color:var(--paper);
    text-decoration:none;
    font-weight:500;
    font-size:14.5px;
    letter-spacing:.04em;
    border:none;
    cursor:pointer;
    transition:transform .15s ease, background-color .25s ease;
  }
  .save:hover{background:var(--accent)}
  .save:active{transform:translateY(1px)}
  .save svg{width:18px;height:18px}

  /* ===== Action list ===== */
  .actions{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:14px;
  }
  .action{
    display:flex;align-items:center;gap:12px;
    padding:13px 14px;
    border:1px solid var(--line);
    border-radius:12px;
    text-decoration:none;
    color:var(--ink);
    background:var(--tile);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    min-width:0;
    transition:border-color .2s ease, background-color .2s ease, transform .15s ease;
  }
  .action:hover{border-color:var(--accent);background:rgba(255,255,255,.85)}
  .action:active{transform:translateY(1px)}

  .action .icon{
    width:36px;height:36px;flex:0 0 36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:var(--ink);color:var(--paper);
  }
  .action .icon svg{width:16px;height:16px}

  .action .meta{
    display:flex;flex-direction:column;line-height:1.2;min-width:0;flex:1;
    overflow:hidden;
  }
  .action .label{
    font-size:10px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .action .value{
    font-size:13.5px;font-weight:500;color:var(--ink);
    margin-top:2px;
    line-height:1.25;
    word-break:break-word;        /* allow long emails to wrap instead of clip */
    overflow-wrap:anywhere;
    white-space:normal;
  }

  /* Full-width rows for long values */
  .full{grid-column:1 / -1}

  /* ===== Footer ===== */
  .footer{
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
    text-align:center;
    font-size:10.5px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:.6;
  }

  /* ===== Toast ===== */
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:var(--paper);
    padding:11px 18px;border-radius:999px;
    font-size:12px;letter-spacing:.06em;
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:380px){
    .actions{grid-template-columns:1fr}
    .card-inner{padding:38px 20px 24px}
  }
</style>
</head>
<body>

<main class="card" aria-label="Leon Diamond digital business card">
  <div class="card-inner">

    <h1 class="wordmark" aria-label="Leon Diamond">
      <span class="leon">LEON</span>
      <span class="diamond">DIAMOND</span>
    </h1>

    <p class="tagline">Fine Jewelry · NYC</p>
    <div class="divider" aria-hidden="true"></div>

    <button class="save" id="saveBtn" type="button" aria-label="Save contact to phone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <line x1="19" y1="8" x2="19" y2="14"></line>
        <line x1="22" y1="11" x2="16" y2="11"></line>
      </svg>
      Save to Contacts
    </button>

    <div class="actions" role="list">

      <a class="action" role="listitem" href="tel:+12123027327" aria-label="Call 212-302-7327">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"></path></svg>
        </span>
        <span class="meta">
          <span class="label">Phone</span>
          <span class="value">212.302.7327</span>
        </span>
      </a>

      <a class="action" role="listitem" href="https://www.instagram.com/leondiamond" target="_blank" rel="noopener" aria-label="Instagram @leondiamond">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </span>
        <span class="meta">
          <span class="label">Instagram</span>
          <span class="value">@leondiamond</span>
        </span>
      </a>

      <a class="action full" role="listitem" href="mailto:Leondiamondnyc@gmail.com" aria-label="Email Leon Diamond">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </span>
        <span class="meta">
          <span class="label">Email</span>
          <span class="value">Leondiamondnyc@gmail.com</span>
        </span>
      </a>

      <a class="action full" role="listitem" href="https://leondiamond.com" target="_blank" rel="noopener" aria-label="Visit leondiamond.com">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </span>
        <span class="meta">
          <span class="label">Website</span>
          <span class="value">leondiamond.com</span>
        </span>
      </a>

      <a class="action full" role="listitem"
         href="https://www.google.com/maps/search/?api=1&query=Leon+Diamond+74+West+47th+Street+New+York+NY+10036"
         target="_blank" rel="noopener"
         aria-label="Directions to 74 West 47th Street New York, NY 10036">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </span>
        <span class="meta">
          <span class="label">Showroom</span>
          <span class="value">74 West 47th Street, New York, NY 10036</span>
        </span>
      </a>

    </div>

    <p class="footer">Established · Diamond District · NYC</p>

  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite">Contact downloaded</div>

<!-- vCard payload embedded inline so Save works offline / from file:// -->
<script id="vcard" type="text/x-vcard">BEGIN:VCARD
VERSION:3.0
FN:Leon Diamond
N:Diamond;Leon;;;
ORG:Leon Diamond
TITLE:Fine Jewelry
TEL;TYPE=WORK,VOICE:+12123027327
EMAIL;TYPE=WORK,INTERNET:Leondiamondnyc@gmail.com
URL:https://leondiamond.com
URL;TYPE=Instagram:https://instagram.com/leondiamond
ADR;TYPE=WORK:;;74 West 47th Street;New York;NY;10036;USA
NOTE:Fine jewelry on 47th Street, NYC.
END:VCARD</script>

<script>
(function(){
  var saveBtn = document.getElementById('saveBtn');
  var vcardText = document.getElementById('vcard').textContent.trim() + '\n';
  var toast = document.getElementById('toast');

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2600);
  }

  saveBtn.addEventListener('click', function(){
    try {
      var blob = new Blob([vcardText], {type:'text/vcard;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'LeonDiamond.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
      showToast('Contact downloaded');
    } catch(err){
      var data = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcardText);
      window.location.href = data;
    }
  });
})();
</script>
</body>
</html>
