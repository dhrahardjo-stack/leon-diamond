<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Leon Diamond — Digital Business Card</title>
<meta name="description" content="Leon Diamond — Fine Jewelry on 47th Street, NYC. Tap to save contact, call, email, or visit the showroom." />
<meta name="theme-color" content="#f3ece0" />

<meta property="og:title" content="Leon Diamond" />
<meta property="og:description" content="Fine Jewelry — 74 West 47th Street, New York" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,700;6..96,900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-1:#f6f0e6;            /* warm champagne page */
    --bg-2:#ece4d3;
    --paper:#fbf6ec;           /* slightly lighter than page = the card */
    --ink:#071828;             /* deep navy — primary text & buttons */
    --ink-soft:#0d2236;
    --accent:#2a6da4;          /* refined blue accent */
    --accent-soft:#4a8cc2;
    --line:rgba(7,24,40,.10);
    --line-strong:rgba(7,24,40,.18);
    --tile:rgba(255,255,255,.55);
    --radius:18px;
    --shadow:0 30px 60px -30px rgba(7,24,40,.25), 0 12px 30px -18px rgba(7,24,40,.18);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 60% at 50% 0%, #fbf7ee 0%, var(--bg-1) 55%, var(--bg-2) 100%);
    min-height:100vh;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding:24px 16px 48px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* ===== Card ===== */
  .card{
    position:relative;
    width:100%;
    max-width:440px;
    background:var(--paper);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    isolation:isolate;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* Folded-paper diamond texture */
  .card::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 380' preserveAspectRatio='xMidYMid slice'>\
<defs>\
<linearGradient id='g1' x1='0' y1='0' x2='1' y2='1'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.85'/>\
<stop offset='1' stop-color='%23d9d0bf' stop-opacity='.45'/>\
</linearGradient>\
<linearGradient id='g2' x1='1' y1='0' x2='0' y2='1'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.75'/>\
<stop offset='1' stop-color='%23c5bba7' stop-opacity='.3'/>\
</linearGradient>\
<linearGradient id='g3' x1='0' y1='1' x2='1' y2='0'>\
<stop offset='0' stop-color='%23ffffff' stop-opacity='.5'/>\
<stop offset='1' stop-color='%23b3a98f' stop-opacity='.2'/>\
</linearGradient>\
</defs>\
<polygon points='0,0 380,0 120,260 0,180' fill='url(%23g1)'/>\
<polygon points='600,0 600,220 320,80 380,0' fill='url(%23g2)'/>\
<polygon points='0,380 240,180 460,380' fill='url(%23g3)'/>\
<polygon points='600,380 360,180 600,160' fill='url(%23g2)'/>\
<polygon points='240,180 460,380 360,180' fill='%23ffffff' fill-opacity='.3'/>\
</svg>");
    background-size:cover;background-position:center;
    opacity:.85;
  }

  .card-inner{position:relative;z-index:1;padding:46px 26px 28px;text-align:center}

  /* ===== Logo ===== */
  .card-logo{
    display:block;
    width:auto;
    height:clamp(52px,13vw,72px);
    margin:0 auto 4px;
    object-fit:contain;
    /* convert white logo to navy #071828 for light background */
    filter: brightness(0) saturate(100%) invert(9%) sepia(40%) saturate(1000%) hue-rotate(182deg) brightness(92%) contrast(98%);
  }

  .tagline{
    margin:18px auto 0;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }

  .divider{
    width:36px;height:1px;background:var(--line-strong);
    margin:18px auto 22px;
  }

  /* ===== Primary CTA ===== */
  .save{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;
    padding:16px 18px;
    border-radius:12px;
    background:var(--ink);
    color:var(--paper);
    text-decoration:none;
    font-weight:500;
    font-size:14.5px;
    letter-spacing:.04em;
    border:none;
    cursor:pointer;
    transition:transform .15s ease, background-color .25s ease;
  }
  .save:hover{background:var(--accent)}
  .save:active{transform:translateY(1px)}
  .save svg{width:18px;height:18px}

  /* ===== Action list ===== */
  .actions{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:14px;
  }
  .action{
    display:flex;align-items:center;gap:12px;
    padding:13px 14px;
    border:1px solid var(--line);
    border-radius:12px;
    text-decoration:none;
    color:var(--ink);
    background:var(--tile);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    min-width:0;
    transition:border-color .2s ease, background-color .2s ease, transform .15s ease;
  }
  .action:hover{border-color:var(--accent);background:rgba(255,255,255,.85)}
  .action:active{transform:translateY(1px)}

  .action .icon{
    width:36px;height:36px;flex:0 0 36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:var(--ink);color:var(--paper);
  }
  .action .icon svg{width:16px;height:16px}

  .action .meta{
    display:flex;flex-direction:column;line-height:1.2;min-width:0;flex:1;
    overflow:hidden;
  }
  .action .label{
    font-size:10px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .action .value{
    font-size:13.5px;font-weight:500;color:var(--ink);
    margin-top:2px;
    line-height:1.25;
    word-break:break-word;        /* allow long emails to wrap instead of clip */
    overflow-wrap:anywhere;
    white-space:normal;
  }

  /* Full-width rows for long values */
  .full{grid-column:1 / -1}

  /* ===== Footer ===== */
  .footer{
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
    text-align:center;
    font-size:10.5px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:.6;
  }

  /* ===== Toast ===== */
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:var(--paper);
    padding:11px 18px;border-radius:999px;
    font-size:12px;letter-spacing:.06em;
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:380px){
    .actions{grid-template-columns:1fr}
    .card-inner{padding:38px 20px 24px}
  }
</style>
</head>
